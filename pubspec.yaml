publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  http: ^1.2.0
  go_router: ^13.0.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.0
  file_selector: ^1.0.3
  path_provider: ^2.1.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
