name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required by Android SDK) ────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Flutter ────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── Generate Android scaffold (jika belum ada) ───────────
      - name: Create Android platform files
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms android --project-name banding_wa .
          fi

      # ── Dependencies ───────────────────────────────────────────
      - name: Get Flutter packages
        run: flutter pub get

      # ── Build APK ─────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      # ── Upload artifact ────────────────────────────────────────
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      # ── Create release on tags ─────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          generate_release_notes: true
